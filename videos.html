<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio de Edição | Soares</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Setup Geral */
        body {
            background-color: #0b0b0b; /* Preto profundo */
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Botão Voltar Estiloso */
        .back-btn {
            text-decoration: none;
            color: #888;
            font-size: 14px;
            transition: 0.3s;
            margin-bottom: 20px;
            align-self: flex-start;
            max-width: 1200px;
        }
        .back-btn:hover { color: #fff; }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 50px;
            background: linear-gradient(to right, #fff, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Grade de Vídeos (O segredo do visual profissional) */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        /* Caixa do Vídeo (Card) */
        .video-card {
            background: #161616;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            transition: transform 0.4s ease, border-color 0.4s ease;
        }

        .video-card:hover {
            transform: translateY(-10px);
            border-color: #444;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* Área do Vídeo */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Mantém o 16:9 */
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Texto abaixo do vídeo */
        .video-info {
            padding: 20px;
        }

        .video-info h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #fff;
        }

        .video-info p {
            margin: 0;
            font-size: 0.9rem;
            color: #888;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← VOLTAR</a>

    <h1>PORTFÓLIO</h1>

    <div class="video-grid">
        
        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/SEU_ID_AQUI_1" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <h3>Cinematic Edition</h3>
                <p>Edição focada em ângulos cinematográficos e extrema performance no GTA V.</p>
            </div>
        </div>

        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/SEU_ID_AQUI_2" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <h3>GTA 5 MINI TRAILER</h3>
                <p>Um pequeno trailer que fiz explorando os limites do Rockstar Editor.</p>
            </div>
        </div>

    </div>

</body>
</html>
