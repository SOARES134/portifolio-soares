<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Vídeos | Portfólio</title>
    <link rel="stylesheet" href="style.css"> <style>
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px 5%;
        }
        .video-card {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
        }
        .video-card:hover {
            transform: scale(1.05);
        }
        .video-card iframe {
            width: 100%;
            height: 200px;
            border: none;
        }
        .video-info {
            padding: 15px;
            color: white;
        }
        .back-btn {
            display: inline-block;
            margin: 20px 5%;
            padding: 10px 20px;
            background: #ff0000;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Voltar para a Início</a>

    <h1 style="text-align: center; color: white; margin-top: 30px;">Galeria de Vídeos e Otimização</h1>

    <div class="video-grid">
        <div class="video-card">
            <iframe src="LINK_DO_YOUTUBE_OU_ARQUIVO_1"></iframe>
            <div class="video-info">
                <h3>Edição Cinemática GTA V</h3>
            </div>
        </div>

        <div class="video-card">
            <iframe src="LINK_DO_YOUTUBE_OU_ARQUIVO_2"></iframe>
            <div class="video-info">
                <h3>Dicas de Otimização PC</h3>
            </div>
        </div>
        
        </div>

</body>
</html>
