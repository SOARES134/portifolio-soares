<style>
    /* Estilo Dark Geral */
    body {
        background-color: #000000; /* Preto total */
        color: #ffffff; /* Texto branco */
        font-family: 'Poppins', sans-serif; /* Mesma fonte do index */
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        color: #ffffff;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 30px;
    }

    /* Botão de Voltar Estilizado */
    .back-btn {
        display: inline-block;
        margin-bottom: 20px;
        padding: 10px 20px;
        background-color: #1a1a1a; /* Cinza bem escuro */
        color: #ffffff;
        text-decoration: none;
        border-radius: 5px;
        border: 1px solid #333;
        transition: 0.3s;
        font-weight: bold;
    }

    .back-btn:hover {
        background-color: #ffffff;
        color: #000000;
    }

    /* Container dos vídeos */
    .video-container {
        width: 100%;
        max-width: 800px;
        background: #0a0a0a; /* Fundo levemente diferente para destacar o vídeo */
        padding: 15px;
        border-radius: 10px;
        border: 1px solid #1f1f1f;
    }

    iframe {
        width: 100%;
        border-radius: 8px;
    }
</style>
